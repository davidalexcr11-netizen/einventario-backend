<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Inventario Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <span class="navbar-brand mb-0 h1">📦 E-Inventario (Nube)</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0">Nuevo Producto</h5>
                </div>
                <div class="card-body">
                    <form id="formCrear">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Código (SKU)</label>
                            <input type="text" class="form-control" id="sku" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre del Producto</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Cantidad Inicial</label>
                            <input type="number" class="form-control" id="stock" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Guardar Producto</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0">Inventario Actual</h5>
                    <div>
                        <button class="btn btn-sm btn-light fw-bold" onclick="cargarInventario()">Actualizar 🔄</button>
                        <button class="btn btn-sm btn-warning fw-bold ms-2" onclick="abrirKardex()">📋 Ver Kárdex</button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover table-striped mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>SKU</th>
                                <th>Producto</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaProductos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalKardex" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">📋 Historial de Movimientos (Kárdex)</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-0">
        <table class="table table-striped mb-0">
          <thead class="table-light">
            <tr>
              <th>Fecha</th>
              <th>Movimiento</th>
              <th>SKU</th>
              <th>Producto</th>
              <th>Cant.</th>
            </tr>
          </thead>
          <tbody id="tablaKardex"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 🚨 1. ¡PON TU LINK DE RENDER AQUÍ! (Asegúrate de que termine en /api)
    const API_URL = 'https://api-einventario.onrender.com/'; 

    async function cargarInventario() {
        try {
            const MODO_NUBE = false; 

    const API_URL = MODO_NUBE 
        ? 'https://api-einventario.onrender.com/api' 
        : 'http://localhost:8080/api';
            const productos = await respuesta.json();
            const tbody = document.getElementById('tablaProductos');
            tbody.innerHTML = ''; 

            productos.forEach(prod => {
                const colorStock = prod.stock < 5 ? 'danger' : 'success';
                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold">${prod.sku}</td>
                        <td>${prod.nombre}</td>
                        <td><span class="badge bg-${colorStock} fs-6">${prod.stock}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-success" onclick="moverStock('${prod.sku}', 'entrada')">➕</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="moverStock('${prod.sku}', 'salida')">➖</button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) { console.error('Error al cargar:', error); }
    }

    async function moverStock(sku, tipo) {
        const cant = prompt(`¿Cuántas unidades de ${tipo} para el producto ${sku}?`);
        if (!cant || isNaN(cant) || cant <= 0) return;
        try {
            await fetch(`${API_URL}/movimiento?sku=${sku}&tipo=${tipo}&cantidad=${cant}`, { method: 'POST' });
            cargarInventario();
        } catch (error) { alert('Error al procesar movimiento'); }
    }

    document.getElementById('formCrear').addEventListener('submit', async function(e) {
        e.preventDefault();
        const sku = document.getElementById('sku').value;
        const nombre = document.getElementById('nombre').value;
        const stock = document.getElementById('stock').value;
        try {
            await fetch(`${API_URL}/crear?sku=${sku}&nombre=${encodeURIComponent(nombre)}&stock=${stock}`, { method: 'POST' });
            document.getElementById('formCrear').reset();
            cargarInventario();
        } catch (error) { alert('Error al guardar'); }
    });

    async function abrirKardex() {
        try {
            const respuesta = await fetch(API_URL + '/kardex');
            const historial = await respuesta.json();
            const tbody = document.getElementById('tablaKardex');
            tbody.innerHTML = ''; 

            historial.forEach(mov => {
                const colorBadge = mov.tipo === 'entrada' ? 'bg-success' : 'bg-danger';
                const textoTipo = mov.tipo === 'entrada' ? 'Entrada ➕' : 'Salida ➖';
                tbody.innerHTML += `
                    <tr>
                        <td class="text-muted small">${mov.fecha}</td>
                        <td><span class="badge ${colorBadge}">${textoTipo}</span></td>
                        <td class="fw-bold">${mov.sku}</td>
                        <td>${mov.nombre}</td>
                        <td class="fw-bold fs-6">${mov.cantidad}</td>
                    </tr>
                `;
            });
            new bootstrap.Modal(document.getElementById('modalKardex')).show();
        } catch (error) { alert('Error al cargar historial.'); }
    }

    document.addEventListener('DOMContentLoaded', cargarInventario);
    
</script>

</body>
</html>
